<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Anonymous</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="resources/chat.js" defer></script>
    <script src="resources/loggedin.js" defer></script>
    <script>
        sessionStorage.setItem("user", "josh");
        sessionStorage.setItem("site", "schat");
        sessionStorage.setItem("locked", "josh");
    </script>
    <link rel="stylesheet" href="resources/style.css">
    <link rel="icon" type="image/x-icon" href="resources/Cookie pfp 2.png">
</head>
<body class="chatsite">
    <div class="cwrapper">
         <div class="messageBox" style="border:2px solid red">
            <h4 style="color:red">System</h4>
                Type and press Enter or the send button to send messages.
            <h6>Sent at 12:00 PM</h6>
        </div>     
    </div>  
    <div id="typing-indicator"><b>Anonymous </b>is typing...</div>
    <div class="inputbox">
        <textarea id="userMsg2" class="login-input" placeholder="Type a message..."></textarea>
        <button class="download-btn" id="sendbtn">Send</button>
    </div>

</body>
</html>
